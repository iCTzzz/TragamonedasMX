<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tragamonedas Mexicano</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slot-machine">
  <h2>Tragamonedas Mexicano</h2>

  <div class="board" id="board"></div>

  <div class="betting">
    <h3>Apuesta por un símbolo</h3>
    <div id="symbols"></div>
  </div>

  <button id="spinBtn">Girar</button>
  <!-- Audio del giro -->
  <audio id="spinSound" src="sonido.mp3"></audio>

  <div class="info">
    Créditos: <span id="credits">100</span> | Premio: <span id="win">0</span>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
